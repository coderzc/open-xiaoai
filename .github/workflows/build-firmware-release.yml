name: Build Firmware Release

on:
  workflow_dispatch:
    inputs:
      mi_did:
        description: Xiaomi speaker DID or device name
        required: true
        type: string

jobs:
  build-and-release:
    name: Build and release patched firmware
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MI_USER: ${{ secrets.MI_USER }}
      MI_PASS: ${{ secrets.MI_PASS }}
      MI_TOKEN: ${{ secrets.MI_TOKEN }}
      MI_DID: ${{ inputs.mi_did }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "$MI_USER" ] || [ -z "$MI_PASS" ]; then
            echo "MI_USER and MI_PASS repository secrets are required."
            exit 1
          fi

          if [ -z "$SSH_PASSWORD" ]; then
            echo "SSH_PASSWORD repository secret is required."
            exit 1
          fi

      - name: Print build diagnostics
        run: |
          echo "== Build diagnostics =="
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "Actor: $GITHUB_ACTOR"
          echo "Runner: $(uname -a)"
          echo "Docker version:"
          docker --version
          echo "Input device identifier: $MI_DID"
          if [ -n "$MI_TOKEN" ]; then
            echo "Auth mode: MI_TOKEN + account"
          else
            echo "Auth mode: account password"
          fi
          echo "MI_USER configured: yes"
          echo "MI_PASS configured: yes"
          echo "MI_TOKEN configured: $([ -n "$MI_TOKEN" ] && echo yes || echo no)"
          echo "SSH_PASSWORD configured: yes"

      - name: Build firmware
        id: build
        working-directory: packages/client-patch
        run: |
          rm -rf assets/*
          mkdir -p assets

          echo "== Starting firmware build in Docker =="
          echo "Working directory: $(pwd)"
          echo "Assets directory: $(pwd)/assets"
          echo "Patches directory: $(pwd)/patches"

          docker run --rm \
            --env MI_USER \
            --env MI_PASS \
            --env MI_TOKEN \
            --env MI_DID \
            --env SSH_PASSWORD \
            -v "$(pwd)/assets:/app/assets" \
            -v "$(pwd)/patches:/app/patches" \
            idootop/open-xiaoai:latest

          echo "== Docker build finished =="
          echo "Assets contents:"
          ls -la assets
          echo "Discovered firmware directories:"
          find assets -maxdepth 2 -type f | sort

          MODEL=$(cat assets/.model)
          VERSION=$(cat assets/.version)
          TAG="${MODEL}_${VERSION}"
          FIRMWARE=$(basename "$(ls assets/*.bin | head -n 1)" .bin)
          ORIGINAL="assets/${TAG}.squashfs"
          PATCHED="assets/${TAG}_patched.squashfs"

          cp "assets/${FIRMWARE}/root.squashfs" "$ORIGINAL"
          cp "assets/${FIRMWARE}/root-patched.squashfs" "$PATCHED"

          {
            echo "model=$MODEL"
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "firmware_dir=$FIRMWARE"
            echo "original_file=$ORIGINAL"
            echo "patched_file=$PATCHED"
          } >> "$GITHUB_OUTPUT"

          echo "Detected model: $MODEL"
          echo "Detected version: $VERSION"
          echo "Release tag: $TAG"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.build.outputs.tag }}
          path: |
            packages/client-patch/${{ steps.build.outputs.original_file }}
            packages/client-patch/${{ steps.build.outputs.patched_file }}
          retention-days: 7

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.build.outputs.tag }}"
          MODEL="${{ steps.build.outputs.model }}"
          VERSION="${{ steps.build.outputs.version }}"
          ORIGINAL="packages/client-patch/${{ steps.build.outputs.original_file }}"
          PATCHED="packages/client-patch/${{ steps.build.outputs.patched_file }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ORIGINAL" "$PATCHED" --clobber
          else
            gh release create "$TAG" \
              "$ORIGINAL" \
              "$PATCHED" \
              --title "${MODEL} v${VERSION}" \
              --notes "Auto-built patched firmware release for ${MODEL} v${VERSION}."
          fi
